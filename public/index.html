<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Technical Skills Login</title>

    <link rel="stylesheet" href="style.css">

<style>

    /* FOOTER NOTE CONTAINER */

/* FOOTER NOTE CONTAINER */

.note-container{

    width:88%;

    max-width:1100px;

    margin-top:0px;

    margin-bottom:20px;

    padding:22px 40px;

    border-radius:28px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,0.95),
        rgba(255,225,225,0.92)
    );

    border:1px solid rgba(255,255,255,0.7);

    backdrop-filter:blur(10px);

    -webkit-backdrop-filter:blur(10px);

    box-shadow:
        0 8px 24px rgba(255,0,0,0.04);

    text-align:center;

    z-index:2;
}

/* MAIN NOTE TEXT */

.note-text{

    color:#6d0000;

    font-size:16px;

    font-weight:500;

    line-height:1.9;
}

/* LAST RED LINE */

.highlight-note{

    margin-top:14px;

    color:#d90429;

    font-size:17px;

    font-weight:700;
}

/* MOBILE */

@media(max-width:768px){

    .note-container{

        width:94%;

        padding:18px 20px;
    }

    .note-text{

        font-size:14px;
    }

    .highlight-note{

        font-size:15px;
    }
}


/* NOTE HEADING */

.note-heading{

    margin-bottom:18px;

    color:#d90429;

    font-size:28px;

    font-weight:700;

    letter-spacing:1px;

    text-shadow:
        0 0 8px rgba(217,4,41,0.35),
        0 0 18px rgba(217,4,41,0.18);

    animation:glow 2s infinite alternate;
}

/* GLOW EFFECT */

@keyframes glow{

    from{

        text-shadow:
            0 0 6px rgba(217,4,41,0.25),
            0 0 14px rgba(217,4,41,0.12);
    }

    to{

        text-shadow:
            0 0 12px rgba(217,4,41,0.45),
            0 0 24px rgba(217,4,41,0.25);
    }
}

/* NOTE LIST */

.note-list{

    list-style:none;

    padding:0;

    margin:0;
}

.note-list li{

    position:relative;

    padding-left:28px;

    margin-bottom:16px;

    color:#6d0000;

    font-size:16px;

    font-weight:500;

    line-height:1.9;

    text-align:left;
}

/* BULLET SYMBOL */

.note-list li::before{

    content:"•";

    position:absolute;

    left:0;

    top:0;

    color:#d90429;

    font-size:24px;

    font-weight:bold;
}

/* =========================================
   CHECK COURSE SECTION
========================================= */

.check-section{

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    margin-top:30px;

    margin-bottom:25px;

    z-index:2;

    position:relative;
}

/* BUTTON */

.check-course-btn{

    text-decoration:none;

    background:linear-gradient(
        135deg,
        #0f9d58,
        #34c759
    );

    color:white;

    padding:16px 38px;

    border-radius:18px;

    font-size:18px;

    font-weight:700;

    letter-spacing:0.5px;

    transition:0.35s ease;

    box-shadow:
        0 10px 28px rgba(15,157,88,0.28);

    position:relative;

    overflow:hidden;
}

/* SHINE EFFECT */

.check-course-btn::before{

    content:"";

    position:absolute;

    top:0;

    left:-120%;

    width:100%;

    height:100%;

    background:rgba(255,255,255,0.25);

    transform:skewX(-25deg);

    transition:0.7s;
}

.check-course-btn:hover::before{

    left:120%;
}

.check-course-btn:hover{

    transform:translateY(-4px) scale(1.03);

    box-shadow:
        0 14px 35px rgba(15,157,88,0.38);
}


/* SUBTITLE */

.check-subtitle{

    margin-top:14px;

    color:#6d0000;

    font-size:16px;

    font-weight:500;

    text-align:center;
}

/* =========================================
   MAIN ENDED CONTAINER
========================================= */

.ended-main-container{

    width:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:10px 20px 40px;
}

/* MAIN BOX */

.ended-box{

    width:90%;

    max-width:900px;

    padding:70px 40px;

    border-radius:32px;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.95),
            rgba(255,240,240,0.92)
        );

    border:1px solid rgba(255,255,255,0.7);

    backdrop-filter:blur(12px);

    -webkit-backdrop-filter:blur(12px);

    box-shadow:
        0 15px 40px rgba(217,4,41,0.08);

    text-align:center;

    position:relative;

    overflow:hidden;
}

/* TOP LIGHT EFFECT */

.ended-box::before{

    content:"";

    position:absolute;

    top:-120px;

    left:-120px;

    width:260px;

    height:260px;

    background:rgba(217,4,41,0.08);

    border-radius:50%;

    filter:blur(40px);
}

/* MAIN TITLE */


.ended-title{

    font-size:48px;

    font-weight:800;

    line-height:1.2;

    letter-spacing:1px;

    color:#d90429;

    text-transform:uppercase;

    text-shadow:
        0 0 10px rgba(217,4,41,0.18);

    animation:glowTitle 2s infinite alternate;
}



/* LINE */

.ended-line{

    width:140px;

    height:5px;

    margin:28px auto 0;

    border-radius:20px;

    background:#d90429;
}

/* GLOW */

@keyframes glowTitle{

    from{

        text-shadow:
            0 0 8px rgba(217,4,41,0.2);
    }

    to{

        text-shadow:
            0 0 22px rgba(217,4,41,0.45);
    }
}

/* =========================================
   MOBILE RESPONSIVE
========================================= */

@media(max-width:768px){

    .check-course-btn{

        width:88%;

        text-align:center;

        font-size:15px;

        padding:14px 20px;
    }

    .check-subtitle{

        font-size:14px;

        width:90%;
    }

    .ended-box{

        padding:50px 20px;
    }

    .ended-title{

        font-size:30px;

        line-height:1.25;
    }

    .ended-line{

        width:90px;
    }
}

</style>
</head>

<body>

    <div class="bg-circle one"></div>
    <div class="bg-circle two"></div>

    <div class="top-header">

        <img src="../clg-logo.png" alt="College Logo" class="college-logo">

        <div class="dept-section">

            <img src="../audi logo.png" alt="Department Logo" class="dept-logo">

            <h2>Department of Data Science</h2>

        </div>

    </div>




<!-- =========================
     CHECK COURSE SECTION
========================= -->

<div class="check-section">

    <a href="courses.html" class="check-course-btn">
        Check Your Course Selected
    </a>

    <p class="check-subtitle">
        Course allotments and batch details can now be viewed.
    </p>

</div>


<!-- =========================
     MAIN ENDED CONTAINER
========================= -->

<div class="ended-main-container">

    <div class="ended-box">

        <h1 class="ended-title">
            Course Selection<br>Time Ended
        </h1>

        <div class="ended-line"></div>

    </div>

</div>



<script src="script.js"></script>
</body>
</html>
